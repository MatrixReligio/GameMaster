name: GameMaster

options:
  bundleIdPrefix: com.matrixreligio
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

packages:
  GameMasterCore:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    # Exact pin + committed Package.resolved: the updater ships inside the
    # signed app, so its version must never float on a rebuild.
    exactVersion: "2.9.4"

settings:
  base:
    DEVELOPMENT_TEAM: 4DUQGD879H
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.3.14"
    CURRENT_PROJECT_VERSION: "21"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"

targets:
  GameMaster:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - package: GameMasterCore
        product: GMModel
      - package: GameMasterCore
        product: GMSystem
      - package: GameMasterCore
        product: GMRuntime
      - package: GameMasterCore
        product: GMBottles
      - package: GameMasterCore
        product: GMLaunch
      - package: GameMasterCore
        product: GMApps
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matrixreligio.gamemaster
        PRODUCT_NAME: GameMaster
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: App/GameMaster.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.games"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 MatrixReligio LLC. Licensed under Apache-2.0."
        INFOPLIST_KEY_CFBundleDisplayName: GameMaster
        INFOPLIST_KEY_LSUIElement: NO
    info:
      path: App/GameMaster-Info.plist
      properties:
        # Reference the build settings above so MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION are the single source of truth — literal
        # values here drifted (project.yml bumped, committed plist stale).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "26.0"
        CFBundleLocalizations: [en, zh-Hans, zh-Hant, ja, ko]
        # Sparkle auto-update. Appcast is published as a stable GitHub "latest
        # release" asset; the EdDSA public key verifies every downloaded update
        # (keychain account "GameMaster"; private key in secrets/, gitignored).
        SUFeedURL: "https://github.com/MatrixReligio/GameMaster/releases/latest/download/appcast.xml"
        SUPublicEDKey: "/awMmT7co+VlNkDUKvFKwk9EjYyBcsdOH8T5kZvP4l8="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
