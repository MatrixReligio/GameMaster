name: GameMaster

options:
  bundleIdPrefix: com.matrixreligio
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

packages:
  GameMasterCore:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"

settings:
  base:
    DEVELOPMENT_TEAM: 4DUQGD879H
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"

targets:
  GameMaster:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - package: GameMasterCore
        product: GMModel
      - package: GameMasterCore
        product: GMSystem
      - package: GameMasterCore
        product: GMRuntime
      - package: GameMasterCore
        product: GMBottles
      - package: GameMasterCore
        product: GMLaunch
      - package: GameMasterCore
        product: GMApps
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matrixreligio.gamemaster
        PRODUCT_NAME: GameMaster
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: App/GameMaster.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.games"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 MatrixReligio LLC. Licensed under Apache-2.0."
        INFOPLIST_KEY_CFBundleDisplayName: GameMaster
        INFOPLIST_KEY_LSUIElement: NO
    info:
      path: App/GameMaster-Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        CFBundleLocalizations: [en, zh-Hans, zh-Hant, ja, ko]
        # Sparkle auto-update. Appcast is published as a stable GitHub "latest
        # release" asset; the EdDSA public key verifies every downloaded update.
        # SUPublicEDKey is filled in by the release-plumbing task (new keypair).
        SUFeedURL: "https://github.com/MatrixReligio/GameMaster/releases/latest/download/appcast.xml"
        SUPublicEDKey: ""
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
