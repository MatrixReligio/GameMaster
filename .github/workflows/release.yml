name: Release

# Manual trigger: notarized releases require signing/notarization secrets
# (DEVELOPER_ID_CERT_P12, ASC_KEY_P8, ASC_ISSUER_ID, ...). Configure those,
# then run this workflow for the tag. Day-to-day releases are cut locally with
# scripts/release.sh, which signs + notarizes against the Keychain.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, e.g. v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build, Sign, Notarize
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install tools
        # The runner image pre-taps aws/tap; newer Homebrew requires tap trust
        # and warns on every invocation. Untap it so the logs stay clean.
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Fetch Sparkle tools (generate_appcast)
        # generate_appcast runs with the EdDSA appcast key in scope — the
        # tarball is checksum-pinned so a moved tag or a MITM can't swap it.
        env:
          SPARKLE_VERSION: "2.9.4"
          SPARKLE_SHA256: "ce89daf967db1e1893ed3ebd67575ed82d3902563e3191ca92aaec9164fbdef9"
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          curl -fsSL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          echo "${SPARKLE_SHA256}  sparkle.tar.xz" | shasum -a 256 -c -
          mkdir -p sparkle && tar -xf sparkle.tar.xz -C sparkle
          echo "SPARKLE_BIN=$RUNNER_TEMP/sparkle/bin" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Store notarization credentials
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -euo pipefail
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc.p8"
          xcrun notarytool store-credentials gamemaster-notary \
            --key "$RUNNER_TEMP/asc.p8" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID"

      - name: Build, sign, notarize, staple, package, appcast
        env:
          VERSION: ${{ github.event.inputs.version }}
          # EdDSA private key for signing the auto-update appcast.
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: ./scripts/release.sh "$VERSION"

      - name: Verify appcast was produced
        run: test -s dist/appcast.xml && echo "appcast OK" || { echo "appcast.xml missing"; exit 1; }

      - name: Upload release artifacts (DMG + appcast)
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # Normalize the tag to a v prefix regardless of how the version was
          # typed: the appcast's enclosure URL is built with "v$VERSION", so a
          # bare "0.3.5" input would otherwise publish a tag the appcast can't
          # download from (this happened once; auto-update would have broken).
          tag_name: ${{ startsWith(github.event.inputs.version, 'v') && github.event.inputs.version || format('v{0}', github.event.inputs.version) }}
          name: GameMaster ${{ startsWith(github.event.inputs.version, 'v') && github.event.inputs.version || format('v{0}', github.event.inputs.version) }}
          files: |
            dist/GameMaster-*.dmg
            dist/appcast.xml
          generate_release_notes: true
